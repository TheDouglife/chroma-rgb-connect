name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:
    inputs:
      target_ref:
        description: 'Branch or tag to check out and run the workflow against'
        required: false
        default: 'main'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
        arch: [x64, arm64]
        dotnet-version: [10.0.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_ref || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Show .NET info
        run: dotnet --info

      - name: Restore (Windows)
        if: matrix.os == 'windows-latest'
        run: dotnet restore ChromaControl.sln

      - name: Restore (Non-Windows)
        if: matrix.os != 'windows-latest'
        run: dotnet restore ChromaControl.sln -p:EnableWindowsTargeting=true -p:ManagePackageVersionsCentrally=false

      - name: Publish for runtime (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          dotnet publish src/Service/ChromaControl.Service.csproj -c Release -r win-${{ matrix.arch }} --self-contained true --no-restore
          dotnet publish src/App/ChromaControl.App.csproj -c Release -r win-${{ matrix.arch }} --self-contained true --no-restore

      - name: Publish for runtime (Non-Windows)
        if: matrix.os != 'windows-latest'
        run: |
          dotnet publish src/Service/ChromaControl.Service.csproj -c Release -r linux-${{ matrix.arch }} --self-contained true --no-restore || true
          dotnet publish src/App/ChromaControl.App.csproj -c Release -r linux-${{ matrix.arch }} --self-contained true --no-restore || true

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: dotnet build ChromaControl.sln -c Release --no-restore

      - name: Build (Non-Windows)
        if: matrix.os != 'windows-latest'
        run: dotnet build ChromaControl.sln -c Release --no-restore -p:EnableWindowsTargeting=true

      - name: Test (Windows)
        if: matrix.os == 'windows-latest'
        run: dotnet test tests/ChromaControl.App.Tests/ChromaControl.App.Tests.csproj -c Release --no-build --verbosity normal

      - name: Test (Non-Windows)
        if: matrix.os != 'windows-latest'
        run: dotnet test tests/ChromaControl.App.Tests/ChromaControl.App.Tests.csproj -c Release --no-build --verbosity normal -p:EnableWindowsTargeting=true || true

      - name: Pack (optional)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          dotnet pack src/Common/ChromaControl.Common.csproj -c Release --no-build -o ./artifacts
          dotnet pack src/App/ChromaControl.App.csproj -c Release --no-build -o ./artifacts
          dotnet pack src/Service/ChromaControl.Service.csproj -c Release --no-build -o ./artifacts

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: ./artifacts || .

  package-msix:
    runs-on: windows-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0.x
      - name: Build
        run: dotnet build ChromaControl.sln -c Release
      - name: MSIX package placeholder
        run: |
          echo "MSIX packaging not fully automated. Replace this step with your MSIX packaging commands, signing, and AppxManifest adjustments."

  package-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0.x

      - name: Find projects
        run: |
          echo "## Projects" > outdated.txt
          find src -name "*.csproj" -print >> outdated.txt || true

      - name: Check outdated packages
        run: |
          for proj in $(find src -name "*.csproj"); do
            echo "\n== $proj ==\n" >> outdated.txt
            dotnet list "$proj" package --outdated -p:EnableWindowsTargeting=true -p:ManagePackageVersionsCentrally=false >> outdated.txt || true
          done

      - name: Upload outdated report
        uses: actions/upload-artifact@v4
        with:
          name: outdated-packages
          path: outdated.txt
