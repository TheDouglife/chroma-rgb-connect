name: CI

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:
    inputs:
      target_ref:
        description: 'Branch or tag to check out and run the workflow against'
        required: false
        default: 'main'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
        arch: [x64]
        dotnet-version: [10.0.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.target_ref || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Show .NET info
        run: dotnet --info

      - name: Restore (Windows)
        if: matrix.os == 'windows-latest'
        run: dotnet restore ChromaConnect.sln -r win-${{ matrix.arch }}

      - name: Restore (Non-Windows)
        if: matrix.os != 'windows-latest'
        run: dotnet restore ChromaConnect.sln -p:EnableWindowsTargeting=true -p:ManagePackageVersionsCentrally=false

      - name: Publish for runtime (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          dotnet publish src/Service/ChromaConnect.Service.csproj -c Release -r win-${{ matrix.arch }} --self-contained true --no-restore
          dotnet publish src/App/ChromaConnect.App.csproj -c Release -r win-${{ matrix.arch }} --self-contained true --no-restore

      - name: Publish for runtime (Non-Windows)
        if: matrix.os != 'windows-latest'
        run: |
          dotnet publish src/Service/ChromaConnect.Service.csproj -c Release -r linux-${{ matrix.arch }} --self-contained true --no-restore || true
          dotnet publish src/App/ChromaConnect.App.csproj -c Release -r linux-${{ matrix.arch }} --self-contained true --no-restore || true

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: dotnet build ChromaConnect.sln -c Release --no-restore

      - name: Build (Non-Windows)
        if: matrix.os != 'windows-latest'
        run: dotnet build ChromaConnect.sln -c Release --no-restore -p:EnableWindowsTargeting=true

      - name: Test (Windows)
        if: matrix.os == 'windows-latest'
        run: dotnet test tests/ChromaConnect.App.Tests/ChromaConnect.App.Tests.csproj -c Release --no-build --verbosity normal

      - name: Test (Non-Windows)
        if: matrix.os != 'windows-latest'
        run: dotnet test tests/ChromaConnect.App.Tests/ChromaConnect.App.Tests.csproj -c Release --no-build --verbosity normal -p:EnableWindowsTargeting=true || true

      - name: Pack (optional)
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.target_ref == 'main')
        run: |
          dotnet pack src/Common/ChromaConnect.Common.csproj -c Release --no-build -o ./artifacts
          dotnet pack src/App/ChromaConnect.App.csproj -c Release --no-build -o ./artifacts
          dotnet pack src/Service/ChromaConnect.Service.csproj -c Release --no-build -o ./artifacts

      - name: Upload artifacts
        if: success() && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.target_ref == 'main'))
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: ./artifacts
          if-no-files-found: ignore

  package-installer:
    runs-on: windows-latest
    needs: build
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))) || (github.event_name == 'workflow_dispatch' && github.event.inputs.target_ref == 'main')
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress --yes
      - name: Build installer
        shell: pwsh
        run: >-
          dotnet publish src/Installer/ChromaConnect.Installer.csproj
          -c Release -r win-x64 --self-contained true
          /p:InnoSetupCompilerPath="${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
      - name: Sign release executables
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_BASE64) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            throw 'Release signing is required for version tags. Configure WINDOWS_CERTIFICATE_BASE64 and WINDOWS_CERTIFICATE_PASSWORD repository secrets.'
          }

          $certificatePath = Join-Path $env:RUNNER_TEMP 'chroma-rgb-connect-signing.pfx'
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))

          $signTool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if ($null -eq $signTool) {
            throw 'Windows SDK signtool.exe was not found on the runner.'
          }

          $executables = @(Get-ChildItem 'src/Installer/bin' -Filter '*.exe' -Recurse)
          if ($executables.Count -eq 0) {
            throw 'No release executables were found to sign.'
          }

          foreach ($executable in $executables) {
            & $signTool.FullName sign /fd SHA256 /f $certificatePath /p $env:WINDOWS_CERTIFICATE_PASSWORD /tr http://timestamp.digicert.com /td SHA256 $executable.FullName
            if ($LASTEXITCODE -ne 0) {
              throw "Signing failed for $($executable.FullName)."
            }
          }

          Remove-Item $certificatePath -Force
      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: chroma-rgb-connect-installer
          path: src/Installer/bin/**/publish/ChromaRGBConnectSetup-*.exe
          if-no-files-found: error

  release-installer:
    runs-on: ubuntu-latest
    needs: package-installer
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download installer
        uses: actions/download-artifact@v8
        with:
          name: chroma-rgb-connect-installer
          path: release
      - name: Prepare latest installer alias
        shell: bash
        run: |
          installer=$(find release -type f -name 'ChromaRGBConnectSetup-*.exe' | head -n 1)
          if [ -z "$installer" ]; then
            echo "No installer was downloaded." >&2
            exit 1
          fi
          cp "$installer" release/ChromaRGBConnectSetup-latest.exe
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/ChromaRGBConnectSetup-*.exe

  package-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Find projects
        run: |
          echo "## Projects" > outdated.txt
          find src -name "*.csproj" -print >> outdated.txt || true

      - name: Check outdated packages
        run: |
          for proj in $(find src -name "*.csproj"); do
            echo "\n== $proj ==\n" >> outdated.txt
            dotnet list "$proj" package --outdated -p:EnableWindowsTargeting=true -p:ManagePackageVersionsCentrally=false >> outdated.txt || true
          done

      - name: Upload outdated report
        uses: actions/upload-artifact@v7
        with:
          name: outdated-packages
          path: outdated.txt
