<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="refresh" content="0; url=./installer/" />
  <title>Chroma RGB Connect Downloads</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f8f4;
      --panel: #ffffff;
      --text: #173018;
      --muted: #58705b;
      --accent: #5aad28;
      --accent-strong: #437f20;
      --border: rgba(67, 127, 32, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(90, 173, 40, 0.18), transparent 35%),
        linear-gradient(180deg, #f9fbf8 0%, var(--bg) 100%);
      color: var(--text);
    }

    main {
      width: min(720px, calc(100vw - 32px));
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 24px 60px rgba(23, 48, 24, 0.12);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3.3rem);
      line-height: 1.05;
    }

    p {
      margin: 0 0 16px;
      font-size: 1.02rem;
      line-height: 1.6;
      color: var(--muted);
    }

    a.button {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      box-shadow: 0 12px 24px rgba(67, 127, 32, 0.24);
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 22px;
    }

    .links a {
      color: var(--accent-strong);
      text-decoration: none;
      font-weight: 600;
    }

    .note {
      margin-top: 22px;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Chroma RGB Connect Downloads</h1>
    <p>This page redirects to the installer download page for the maintained Chroma RGB Connect release.</p>
    <a class="button" href="./installer/">Open installer page</a>
    <div class="links">
      <a href="https://github.com/TheDouglife/chroma-rgb-connect/releases">GitHub Releases</a>
      <a href="https://github.com/TheDouglife/chroma-rgb-connect">Source repository</a>
    </div>
    <p class="note">If you are viewing this locally, publish the contents of the <code>docs</code> folder through GitHub Pages.</p>
  </main>
</body>
</html>
